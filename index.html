<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridu Chowdhury | Official Artist Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <meta property="og:title" content="Ridu Chowdhury">
    <meta property="og:description" content="Singer • Songwriter • Dreamer">
    <meta property="og:type" content="website">
</head>
<body>

    <div class="ambient-glow"></div>

    <main class="container">
        <header class="profile-section">
            <div class="profile-img-container">
                <img id="profile-img" src="" alt="Ridu Chowdhury">
            </div>
            <h1 class="artist-name">
                <span id="artist-name"></span>
                <i class="fas fa-check-circle verified-badge"></i>
            </h1>
            <p id="bio1" class="bio-primary"></p>
            <p id="bio2" class="bio-secondary"></p>
        </header>

        <section class="social-grid" id="social-links">
            </section>

        <section class="spotify-card">
            <div id="spotify-container">
                </div>
        </section>

        <footer>
            <p>&copy; <span id="year"></span> Ridu Chowdhury. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
