<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridu Chowdhury | Official Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <header class="header-section">
            <div class="profile-frame">
                <img src="profile.jpg" alt="Ridu Chowdhury" class="avatar">
            </div>
            <h1 class="artist-name">Ridu Chowdhury <i class="fas fa-check-circle verified-badge"></i></h1>
            <p class="role-title">Singer • Songwriter • Dreamer</p>
            <p class="bio-desc">Creating music that touches hearts.</p>
        </header>

        <div class="social-grid">
            <a href="http://googleusercontent.com/spotify.com/8" target="_blank" class="social-link">
                <div class="icon-bg spotify"><i class="fab fa-spotify"></i></div>
                <span>Spotify</span>
            </a>
            <a href="https://music.apple.com/us/artist/ridu-chowdhury/1896496372" target="_blank" class="social-link">
                <div class="icon-bg apple"><i class="fab fa-apple"></i></div>
                <span>Apple Music</span>
            </a>
            <a href="https://youtube.com/@ridu_music?si=fMV2yQ9UUbX4IvSy" target="_blank" class="social-link">
                <div class="icon-bg youtube"><i class="fab fa-youtube"></i></div>
                <span>YouTube</span>
            </a>
            <a href="https://www.facebook.com/riduchowdhurymusic" target="_blank" class="social-link">
                <div class="icon-bg facebook"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://www.instagram.com/riduchowdhurymusic" target="_blank" class="social-link">
                <div class="icon-bg instagram"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://x.com/ridu_music" target="_blank" class="social-link">
                <div class="icon-bg twitter"><i class="fab fa-twitter"></i></div>
                <span>Twitter</span>
            </a>
        </div>

        <div class="player-section">
            <iframe 
                style="border-radius:15px" 
                src="http://googleusercontent.com/spotify.com/9" 
                width="100%" 
                height="380" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <footer class="site-footer">
            <p>© 2024 Ridu Chowdhury. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
