<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridu Chowdhury - Music Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <img id="profile-pic" src="assets/profile.jpg" alt="Profile Picture">
      <h1 id="artist-name">Ridu Chowdhury <span class="verified">✔</span></h1>
      <p id="artist-bio">Creating music that touches hearts.</p>
    </div>

    <div class="social-links">
      <!-- Social icons will be dynamically added here -->
    </div>

    <div class="spotify-player" id="spotify-player">
      <!-- Spotify embed player will load here -->
    </div>

    <footer id="footer">
      © 2024 Ridu Chowdhury. All rights reserved.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
