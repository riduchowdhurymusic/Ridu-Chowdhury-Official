<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridu Chowdhury | Artist Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Design */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* Profile Section */
        .profile-img-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 2px solid #1db954;
            padding: 5px;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0 5px;
        }

        .verified-tick {
            color: #1db954;
            font-size: 20px;
        }

        .sub-title {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .bio {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 35px;
        }

        /* Social Icons Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .social-item {
            text-decoration: none;
            color: #a0a0a0;
            font-size: 10px;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin: 0 auto 6px;
            transition: 0.3s;
        }

        .social-item:hover .icon-box {
            background: #282828;
            transform: translateY(-5px);
            color: #fff;
        }

        /* Brand Colors on Hover */
        .spotify:hover { color: #1db954; }
        .apple:hover { color: #fc3c44; }
        .youtube:hover { color: #ff0000; }
        .facebook:hover { color: #1877f2; }
        .instagram:hover { color: #e4405f; }
        .twitter:hover { color: #1da1f2; }

        /* Spotify Player Card */
        .player-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            background: #121212;
        }

        footer {
            margin-top: 50px;
            color: #555;
            font-size: 11px;
        }

        @media (max-width: 420px) {
            .social-grid {
                grid-template-columns: repeat(3, 1fr);
                row-gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-img-container">
                <img src="your-photo.jpg" alt="Ridu Chowdhury">
            </div>
            <h1 class="name">Ridu Chowdhury <i class="fas fa-check-circle verified-tick"></i></h1>
            <p class="sub-title">Singer • Songwriter • Dreamer</p>
            <p class="bio">Ridu Chowdhury Bangladeshi Musician. Creating music that touches hearts.</p>
        </header>

        <div class="social-grid">
            <a href="https://open.spotify.com/artist/4X9z9KjHn0Tz9n7P" target="_blank" class="social-item">
                <div class="icon-box spotify"><i class="fab fa-spotify"></i></div>
                <span>Spotify</span>
            </a>
            <a href="https://music.apple.com/us/artist/ridu-chowdhury/1896496372" target="_blank" class="social-item">
                <div class="icon-box apple"><i class="fab fa-apple"></i></div>
                <span>Apple Music</span>
            </a>
            <a href="https://youtube.com/@ridu_music?si=fMV2yQ9UUbX4IvSy" target="_blank" class="social-item">
                <div class="icon-box youtube"><i class="fab fa-youtube"></i></div>
                <span>YouTube</span>
            </a>
            <a href="https://www.facebook.com/riduchowdhurymusic" target="_blank" class="social-item">
                <div class="icon-box facebook"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://www.instagram.com/riduchowdhurymusic" target="_blank" class="social-item">
                <div class="icon-box instagram"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://x.com/ridu_music" target="_blank" class="social-item">
                <div class="icon-box twitter"><i class="fab fa-twitter"></i></div>
                <span>Twitter</span>
            </a>
        </div>

        <div class="player-card">
            <iframe 
                style="border-radius:12px" 
                src="https://open.spotify.com/embed/artist/4X9z9KjHn0Tz9n7P?utm_source=generator&theme=0" 
                width="100%" 
                height="380" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <footer>
            <p>© 2024 Ridu Chowdhury. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
