<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridu Chowdhury | Artist Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* Profile Header */
        .profile-pic-border {
            width: 125px;
            height: 125px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 2px solid #1db954;
            padding: 5px;
        }

        .profile-pic-border img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verified-icon {
            color: #1db954;
            font-size: 20px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .bio {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* Social Icons Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .social-item {
            text-decoration: none;
            color: #a0a0a0;
            font-size: 10px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin: 0 auto 6px;
            transition: 0.3s;
        }

        .social-item:hover .icon-box {
            background: #282828;
            transform: translateY(-5px);
            color: #fff;
        }

        /* Spotify Card */
        .spotify-card {
            background-color: #0d3b1f; /* Dark Green Background */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        footer {
            margin-top: 50px;
            color: #444;
            font-size: 11px;
        }

        @media (max-width: 420px) {
            .social-grid {
                grid-template-columns: repeat(3, 1fr);
                row-gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-pic-border">
                <img src="profile.jpg" alt="Ridu Chowdhury">
            </div>
            <h1 class="name">Ridu Chowdhury <i class="fas fa-check-circle verified-icon"></i></h1>
            <p class="subtitle">Singer • Songwriter • Dreamer</p>
            <p class="bio">Ridu Chowdhury Bangladeshi Musician.<br>Creating music that touches hearts.</p>
        </header>

        <div class="social-grid">
            <a href="https://open.spotify.com/embed/artist/4Y06IiaS6H867FvO6lS62V?utm_source=generator&theme=02" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-spotify" style="color: #1db954;"></i></div>
                <span>Spotify</span>
            </a>
            <a href="https://music.apple.com/us/artist/ridu-chowdhury/1896496372" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-apple" style="color: #fc3c44;"></i></div>
                <span>Apple Music</span>
            </a>
            <a href="https://youtube.com/@ridu_music?si=fMV2yQ9UUbX4IvSy" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-youtube" style="color: #ff0000;"></i></div>
                <span>YouTube</span>
            </a>
            <a href="https://www.facebook.com/riduchowdhurymusic" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-facebook" style="color: #1877f2;"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://www.instagram.com/riduchowdhurymusic" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-instagram" style="color: #e4405f;"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://x.com/ridu_music" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-twitter" style="color: #1da1f2;"></i></div>
                <span>Twitter</span>
            </a>
        </div>

        <div class="spotify-card">
            <iframe 
                style="border-radius:12px" 
                src="https://open.spotify.com/embed/artist/4Y06IiaS6H867FvO6lS62V?utm_source=generator&theme=03" 
                width="100%" 
                height="400" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <footer>
            <p>© 2024 Ridu Chowdhury. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
