<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridu Chowdhury | Artist Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-wrapper">
        
        <header class="profile-header">
            <div class="avatar">
                <img src="your-image-link.jpg" alt="Ridu Chowdhury">
            </div>
            <h1 class="artist-name">Ridu Chowdhury <i class="fas fa-check-circle verified-icon"></i></h1>
            <p class="designation">Singer • Songwriter • Dreamer</p>
            <p class="bio-text">Creating music that touches hearts.</p>
        </header>

        <div class="social-links-grid">
            <a href="YOUR_SPOTIFY_LINK" class="social-box"><i class="fab fa-spotify"></i><span>Spotify</span></a>
            <a href="YOUR_APPLE_MUSIC_LINK" class="social-box"><i class="fab fa-apple"></i><span>Apple Music</span></a>
            <a href="YOUR_YOUTUBE_LINK" class="social-box"><i class="fab fa-youtube"></i><span>YouTube</span></a>
            <a href="YOUR_FACEBOOK_LINK" class="social-box"><i class="fab fa-facebook"></i><span>Facebook</span></a>
            <a href="YOUR_INSTAGRAM_LINK" class="social-box"><i class="fab fa-instagram"></i><span>Instagram</span></a>
            <a href="YOUR_TWITTER_LINK" class="social-box"><i class="fab fa-twitter"></i><span>Twitter</span></a>
        </div>

        <div class="spotify-card-container">
            <iframe 
                style="border-radius:15px" 
                src="https://open.spotify.com/artist/7se5YQtsrXcxlvBxEtJq5s?si=CNezL_xTQcGe5J5HAkWGrA=generator&theme=0" 
                width="100%" 
                height="380" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <footer class="footer-copy">
            <p>© 2024 Ridu Chowdhury. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
