<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile | Ridu Chowdhury</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="profile-container">
        
        <header class="header">
            <div class="profile-pic-container">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwNKikQBO7krsVZdGkjfrLbAUhduZrZQXa6JDhwiuO5g&s" alt="Ridu Chowdhury" class="profile-pic">
            </div>
            <h1 class="name">Ridu Chowdhury <i class="fas fa-check-circle verified"></i></h1>
            <p class="role">Singer • Songwriter • Dreamer</p>
            <p class="bio">Creating music that touches hearts.</p>
        </header>

        <div class="social-grid">
            <a href="https://spotify.com" target="_blank" class="social-item">
                <div class="icon-box spotify"><i class="fab fa-spotify"></i></div>
                <span>Spotify</span>
            </a>
            <a href="https://apple.com" target="_blank" class="social-item">
                <div class="icon-box apple"><i class="fab fa-apple"></i></div>
                <span>Apple Music</span>
            </a>
            <a href="https://youtube.com" target="_blank" class="social-item">
                <div class="icon-box youtube"><i class="fab fa-youtube"></i></div>
                <span>YouTube</span>
            </a>
            <a href="https://facebook.com" target="_blank" class="social-item">
                <div class="icon-box facebook"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://instagram.com" target="_blank" class="social-item">
                <div class="icon-box instagram"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://twitter.com" target="_blank" class="social-item">
                <div class="icon-box twitter"><i class="fab fa-twitter"></i></div>
                <span>Twitter</span>
            </a>
        </div>

        <div class="music-player-card">
            <iframe 
                style="border-radius:15px" 
                src="https://open.spotify.com/embed/artist/4Y06IiaS6H867FvO6lS62V?utm_source=generator&theme=0" 
                width="100%" 
                height="380" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <footer class="footer">
            <p>© 2024 Ridu Chowdhury. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
